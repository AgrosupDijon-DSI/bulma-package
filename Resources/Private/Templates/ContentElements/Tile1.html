<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" xmlns:asd="http://typo3.org/ns/AgrosupDijon/BulmaPackage/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Default" />
<f:section name="Main">

    <div class="media-gallery {f:if(condition: '{data.gallery_size}', then:'media-gallery-{data.gallery_size}')}">
        <f:if condition="{files}">

            <f:variable name="imagecols">2</f:variable>
            <f:variable name="columnConfig">{settings.gallery.columns.{imagecols}}</f:variable>
            <f:for each="{layoutClasses}" as="class">
                <f:variable name="allClasses">{allClasses} {class}</f:variable>
                <f:if condition="{class} == 'is-gapless'">
                    <f:variable name="gapless" value="1" />
                </f:if>
            </f:for>

            <asd:data.imageVariants as="variants" variants="{variants}" multiplier="{columnConfig.multiplier}" gutters="{f:if(condition: '!{gapless}', then: '{columnConfig.gutters}')}" corrections="{columnConfig.corrections}" />
            <asd:data.chunk as="tiles" data="{files}" length="3" />

            <f:for each="{tiles}" as="tile">
                <div class="tile is-ancestor {allClasses}">
                    <div class="tile is-6 is-parent">
                        <div class="tile is-child">
                            <f:render partial="Media/Type" arguments="{file: tile.0, data: data, settings: settings, variants: variants}" />
                        </div>
                    </div>
                    <f:if condition="{tile.1}">
                        <div class="tile is-parent is-vertical">
                            <div class="tile is-child">
                                <f:render partial="Media/Type" arguments="{file: tile.1, data: data, settings: settings, variants: variants}" />
                            </div>
                            <f:if condition="{tile.2}">
                                <div class="tile is-child">
                                    <f:render partial="Media/Type" arguments="{file: tile.2, data: data, settings: settings, variants: variants}" />
                                </div>
                            </f:if>
                        </div>
                    </f:if>
                </div>
            </f:for>
        </f:if>

    </div>

</f:section>
</html>
